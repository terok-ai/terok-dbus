exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Layered architecture ────────────────────────────────────────────
#
# Orthogonal to the feature-grouped directories.  Each leaf module
# pins a layer; tach rejects any cross-layer dep that climbs the stack.
#
# domain         — pure value types + invariants (zero internal deps)
# wire           — varlink schema + unix-socket helpers (→ domain)
# infrastructure — hub, client, notification backends, runtime (→ wire, domain)
# interface      — cli, package public surface (→ anything below)

[[layers]]
name = "interface"

[[layers]]
name = "infrastructure"

[[layers]]
name = "wire"

[[layers]]
name = "domain"


# ── Package root ────────────────────────────────────────────────────
# Public re-exports from every feature sub-package.

[[modules]]
path = "terok_clearance"
layer = "interface"
depends_on = [
]


# ── Domain layer ────────────────────────────────────────────────────

[[modules]]
path = "terok_clearance.domain.events"
layer = "domain"
depends_on = []


# ── Wire layer ──────────────────────────────────────────────────────

[[modules]]
path = "terok_clearance.wire.socket"
layer = "wire"
depends_on = []

[[modules]]
path = "terok_clearance.wire.interface"
layer = "wire"
depends_on = []

[[modules]]
path = "terok_clearance.wire.errors"
layer = "wire"
depends_on = ["terok_clearance.wire.interface"]


# ── Infrastructure layer ────────────────────────────────────────────

# Notifications — Notifier protocol sits at the domain edge of the
# notification tree; the three concrete backends are infrastructure.
[[modules]]
path = "terok_clearance.notifications.protocol"
layer = "domain"
depends_on = []

[[modules]]
path = "terok_clearance.notifications.null"
layer = "infrastructure"
depends_on = []

[[modules]]
path = "terok_clearance.notifications.callback"
layer = "infrastructure"
depends_on = []

[[modules]]
path = "terok_clearance.notifications.desktop"
layer = "infrastructure"
depends_on = []

[[modules]]
path = "terok_clearance.notifications.factory"
layer = "infrastructure"
depends_on = [
    "terok_clearance.notifications.desktop",
    "terok_clearance.notifications.null",
    # notifications.protocol sits in the domain layer — the infra →
    # domain dep is implicit via the layer hierarchy; listing it here
    # reads as "unused" to ``tach check``.
]

# Hub — varlink server + reader ingestion + shield exec.
[[modules]]
path = "terok_clearance.hub.ingester"
layer = "infrastructure"
depends_on = []

[[modules]]
path = "terok_clearance.hub.server"
layer = "infrastructure"
depends_on = [
    "terok_clearance.hub.ingester",
    "terok_clearance.runtime.service",
    "terok_clearance.verdict.client",
]

# Verdict — helper varlink service + hub-side client.  Stateless;
# the hub handles all authz before forwarding a triple here.
[[modules]]
path = "terok_clearance.verdict.shield_exec"
layer = "infrastructure"
depends_on = []

[[modules]]
path = "terok_clearance.verdict.interface"
layer = "wire"
depends_on = []

[[modules]]
path = "terok_clearance.verdict.socket"
layer = "wire"
depends_on = ["terok_clearance.wire.socket"]

[[modules]]
path = "terok_clearance.verdict.client"
layer = "infrastructure"
depends_on = []

[[modules]]
path = "terok_clearance.verdict.server"
layer = "infrastructure"
depends_on = [
    "terok_clearance.runtime.service",
    "terok_clearance.verdict.shield_exec",
]

# Client — varlink consumer library.
[[modules]]
path = "terok_clearance.client.client"
layer = "infrastructure"
depends_on = [
]

[[modules]]
path = "terok_clearance.client.subscriber"
layer = "infrastructure"
depends_on = [
    "terok_clearance.client.client",
    # notifications.protocol is only referenced under TYPE_CHECKING —
    # tach.ignore_type_checking_imports skips it, so it's not in deps.
]

# Runtime — deployment helpers.
[[modules]]
path = "terok_clearance.runtime.service"
layer = "infrastructure"
depends_on = []

[[modules]]
path = "terok_clearance.runtime.installer"
layer = "infrastructure"
depends_on = []

# Notifier daemon — subscribes to the hub, renders desktop popups.
# Separate feature dir so its lifecycle is isolated from the hub/verdict
# pair; installed by the runtime installer but runs in its own systemd
# unit with its own crash radius.  Identity arrives in the per-event
# dossier (resolved by the shield reader at emit time), so the daemon
# carries no inspector wiring of its own.
[[modules]]
path = "terok_clearance.notifier.app"
layer = "infrastructure"
depends_on = [
    "terok_clearance.client.subscriber",
    "terok_clearance.notifications.factory",
    "terok_clearance.runtime.service",
]


# ── Interface layer ─────────────────────────────────────────────────

[[modules]]
path = "terok_clearance.cli.main"
layer = "interface"
depends_on = ["terok_clearance.cli.registry"]

[[modules]]
path = "terok_clearance.cli.registry"
layer = "interface"
depends_on = ["terok_clearance.cli.terminal_clearance"]

[[modules]]
path = "terok_clearance.cli.terminal_clearance"
layer = "interface"
depends_on = [
]
