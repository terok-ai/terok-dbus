exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Module Boundaries ───────────────────────────────────────────────
#
# Leaf modules (no dependencies):
#   _constants, _protocol, _null
#
# Internal modules:
#   _notifier → _constants
#
# CLI:
#   _cli → terok_dbus (public API)

# Package root — public API (re-exports from internal modules)
[[modules]]
path = "terok_dbus"
depends_on = [
    { path = "terok_dbus._interfaces" },
    { path = "terok_dbus._notifier" },
    { path = "terok_dbus._null" },
    { path = "terok_dbus._protocol" },
    { path = "terok_dbus._subscriber" },
]

# D-Bus constants and close-reason codes
[[modules]]
path = "terok_dbus._constants"
depends_on = []

# Notifier protocol definition
[[modules]]
path = "terok_dbus._protocol"
depends_on = []

# Shield1 / Clearance1 interface definitions
[[modules]]
path = "terok_dbus._interfaces"
depends_on = []

# NullNotifier (headless fallback)
[[modules]]
path = "terok_dbus._null"
depends_on = []

# DbusNotifier (dbus-fast implementation)
[[modules]]
path = "terok_dbus._notifier"
depends_on = [{ path = "terok_dbus._constants" }]

# Event subscriber (Shield1 + Clearance1 signal bridge)
[[modules]]
path = "terok_dbus._subscriber"
depends_on = [{ path = "terok_dbus._interfaces" }]

# Command registry (consumed by CLI and terok integration layer)
[[modules]]
path = "terok_dbus._registry"
depends_on = []

# CLI entry point
[[modules]]
path = "terok_dbus._cli"
depends_on = [{ path = "terok_dbus._registry" }]
